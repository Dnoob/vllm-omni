# Stage config for running Qwen3-Omni-MoE with 3-stage architecture on GPUs with less VRAM.
# The Thinker stage uses tensor_parallel_size=2 to split across both GPUs,
# allowing the model to fit on GPUs with less VRAM (e.g. 2x 48GB).
# Stage 0: Thinker (multimodal understanding + text generation) - runs across both GPUs with TP=2
# Stage 1: Talker (text embeddings → 8-layer RVQ codec codes) - runs on GPU 1
# Stage 2: Code2Wav (8-layer RVQ codes → audio waveform) - runs on GPU 1

# Verified on 2x H20 GPUs. Designed for GPUs with less VRAM (e.g. 2x 48GB),
# where gpu_memory_utilization values are tuned so all three stages fit on 2 GPUs.
async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm  # Use llm stage type for AR stages
    runtime:
      devices: "0,1"
    engine_args:
      model_stage: thinker
      max_num_seqs: 64
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.7
      enforce_eager: false
      trust_remote_code: true
      engine_output_type: latent  # Output hidden states for talker
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      hf_config_name: thinker_config
      tensor_parallel_size: 2
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      detokenize: True
      repetition_penalty: 1.05

  - stage_id: 1
    stage_type: llm  # Use llm stage type for AR stages
    runtime:
      devices: "1"
    engine_args:
      model_stage: talker
      max_num_seqs: 64
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.2
      enforce_eager: false
      trust_remote_code: true
      engine_output_type: latent  # Output codec codes for code2wav
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      distributed_executor_backend: "mp"
      hf_config_name: talker_config
      tensor_parallel_size: 1
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker
    # final_output: true
    # final_output_type: text
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: False
      repetition_penalty: 1.05
      stop_token_ids: [2150]

  - stage_id: 2
    stage_type: llm  # Use llm stage type for AR stages
    runtime:
      devices: "1"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 32
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio  # Final output: audio waveform
      gpu_memory_utilization: 0.05
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 1000000
      hf_config_name: thinker_config
      tensor_parallel_size: 1
    engine_input_source: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: True
      repetition_penalty: 1.1
